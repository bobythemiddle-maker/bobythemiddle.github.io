<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Quiz Tool Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --container-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --card-gradient: linear-gradient(135deg, #334155, #1e293b);
            --input-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #4ade80;
            --error: #fb7185;
        }

        [data-theme="light"] {
            --bg: #f1f5f9;
            --container-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-sub: #64748b;
            --accent: #0284c7;
            --accent-glow: rgba(2, 132, 199, 0.2);
            --card-gradient: linear-gradient(135deg, #ffffff, #f1f5f9);
            --input-bg: #ffffff;
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text-main); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; transition: background 0.3s; overflow: hidden; }

        .top-nav { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 100; }
        .icon-btn { background: var(--container-bg); border: 1px solid var(--glass-border); color: var(--text-main); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; backdrop-filter: blur(10px); transition: 0.2s; }
        .icon
